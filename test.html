<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Projet Test</title>
  <style>
    :root {
      --border-radius-xl: 16px;
      --font-size-lg: 1rem;
      --primary-700: #2d6cdf;
      --primary-200: #d6e4ff;
      --primary-900: #0a2a66;
      --secondary-200: #ffe9d6;
      --secondary-900: #66360a;
      --accent-200: #e0ffd6;
      --accent-900: #1f660a;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-800: #1f2937;
    }

    body {
      font-family: sans-serif;
      background: #f9fafb;
      color: #111;
      padding: 2rem;
    }

    .grid-projects {
      display: grid;
      gap: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .card {
      text-align: justify;
      border-radius: var(--border-radius-xl);
      padding: var(--font-size-lg);
      background: #fff;
    }

    .photo {
      width: clamp(250px, 35vh, 500px);
      height: clamp(250px, 35vh, 500px);
      object-fit: scale-down;
      border-radius: 100%;
    }

    .shadows {
      box-shadow:
        0 10px 15px -3px rgba(0, 0, 0, 0.1),
        0 4px 6px -4px rgba(0, 0, 0, 0.1);
    }

    .project-card img {
      width: 100%;
      border-radius: var(--border-radius-xl);
      margin-bottom: 1rem;
    }

    .project-titles {
      font-weight: bold;
      margin: 0.5rem 0;
    }

    .project-resume {
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .project-features {
      margin: 0 0 1rem 1rem;
    }

    .project-marker {
      list-style-type: disc;
    }

    .tag {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      margin: 0.2rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      background-color: var(--gray-200);
      color: var(--gray-800);
      transition: all 0.2s ease-in-out;
    }

    .tag:hover {
      background-color: var(--gray-300);
      transform: scale(1.05);
    }

    /* variantes pour classer les technos */
    .tag.frontend {
      background-color: var(--primary-200);
      color: var(--primary-900);
    }

    .tag.backend {
      background-color: var(--secondary-200);
      color: var(--secondary-900);
    }

    .tag.database {
      background-color: var(--accent-200);
      color: var(--accent-900);
    }

    .project-button {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .project-link {
      color: var(--primary-700);
      text-decoration: none;
      font-weight: bold;
    }

    .project-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <section class="grid-projects">
    <article class="project-card card shadows">
      <img alt="projet 2" src="https://via.placeholder.com/400x200.png?text=Projet+2">
      <div class="project-content">
        <p class="project-titles text-xl-bold">Projet 2</p>
        <p class="project-resume">Lorem ipsum dolor sit amet, petite description rapide.</p>

        <p class="project-titles">Fonctionnalités clés</p>
        <ul class="project-features">
          <li class="project-marker">Feature 1</li>
          <li class="project-marker">Feature 2</li>
          <li class="project-marker">Feature 3</li>
        </ul>

        <p class="project-titles">Technologies utilisées</p>
        <span class="tag frontend">React</span>
        <span class="tag backend">Prisma</span>
        <span class="tag database">PostgreSQL</span>
        <span class="tag">TailwindCSS</span>

        <div class="project-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 20.5C6.5 21.7 3.7 20.5 2 17"/>
            <path d="M10 22V18.7c0-.6.2-1.1.5-1.6-.2-.3-.6-.5-1-.6C7.1 15.5 5 14.1 5 9.6c0-1.2.4-2.3 1-3.2.2-.3.3-.4.3-.5 0-.1 0-.2 0-.5C6 4.3 6 3.1 6.4 2c0 0 .9-.3 2.9 1 1 .6 1.2.8 1.4.9.2 0 .5 0 1.1-.1C12 3.1 12.6 3 13.5 3c.9 0 1.5.1 2.1.3.6.1.9.2 1.1.1.2 0 .4-.2 1.4-.9 2-1.3 2.9-1 2.9-1 .4 1.1.4 2.3.1 3.4 0 .3 0 .4 0 .5 0 .1.1.3.3.6.6.9 1 2 1 3.1 0 4.5-2.1 5.9-5.1 6.7-.4.1-.8.3-1 .6.3.5.5 1 .5 1.6V22"/>
          </svg>
          <a href="#" target="_blank" class="project-link">Voir le projet</a>
        </div>
      </div>
    </article>
  </section>

</body>
</html>
